<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2d6a2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Golf Ball Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="view-home" class="view"></div>
    <div id="view-list" class="view"></div>
    <div id="view-detail" class="view"></div>
    <div id="view-log" class="view"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <button id="lightbox-close" aria-label="Close">&#x2715;</button>
    <img id="lightbox-img" src="" alt="Full size photo">
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden" aria-label="Loading">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
