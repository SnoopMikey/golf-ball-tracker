<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1f3a25">
  <meta name="description" content="Tracking every golf ball Mike finds. Yes, it's exactly what it sounds like.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mike's Balls &#x26F3; Golf Ball Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="view-home" class="view"></div>
    <div id="view-list" class="view"></div>
    <div id="view-detail" class="view"></div>
    <div id="view-log" class="view"></div>
    <div id="view-stats" class="view"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <button id="lightbox-close" aria-label="Close">&#x2715;</button>
    <div id="lightbox-counter"></div>
    <button id="lightbox-prev" class="lightbox-arrow hidden" aria-label="Previous photo">&#8249;</button>
    <button id="lightbox-next" class="lightbox-arrow hidden" aria-label="Next photo">&#8250;</button>
    <div id="lightbox-track"></div>
  </div>

  <!-- Splash overlay -->
  <div id="splash-overlay" class="hidden">
    <button id="splash-close" aria-label="Close">&#x2715;</button>
    <img id="splash-img" src="mikesballs-iphone.png" alt="Mike's Balls">
  </div>

  <!-- One-time "rate my balls" promo -->
  <div id="promo-modal" class="hidden">
    <div class="promo-box">
      <div class="promo-eyebrow">New to the clubhouse</div>
      <h2 class="promo-title">Mike's balls are now open for judgment.</h2>
      <div class="promo-stars" aria-hidden="true">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
      <p class="promo-body">Every ball takes ratings and comments now. Five stars, hot takes, first names only &mdash; open any entry and speak your mind. The balls can take it.</p>
      <div class="promo-actions">
        <button id="promo-go" class="btn-promo-go">Judge a Ball</button>
        <button id="promo-later" class="btn-promo-later">I'll keep my opinions to myself</button>
      </div>
    </div>
  </div>

  <!-- Admin password modal -->
  <div id="admin-modal" class="hidden">
    <form class="admin-box" id="admin-form">
      <h2>&#x1F510; Admin Access</h2>
      <p>Prove you're Mike. Only Mike may touch these balls.</p>
      <input type="password" id="admin-pass" placeholder="Password" autocomplete="off">
      <div class="admin-actions">
        <button type="button" id="admin-cancel" class="btn-admin-cancel">Cancel</button>
        <button type="submit" id="admin-submit" class="btn-admin-submit">Unlock</button>
      </div>
    </form>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden" aria-label="Loading">
    <div class="spinner"></div>
    <div id="loading-pun"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
